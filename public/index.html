<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FF6B35" />
    <meta name="description" content="Asquare & Co. Tours & Travels — Premium Travel Experiences" />
    <title>Asquare & Co. Tours & Travels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
      /* ── Initial page loader — shows before React mounts ── */
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #FFFBF5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #initial-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .il-logo {
        width: 72px;
        height: 72px;
        border-radius: 14px;
        object-fit: contain;
        animation: il-pulse 1.8s ease-in-out infinite;
      }
      .il-brand {
        font-family: Georgia, serif;
        font-size: 22px;
        font-weight: 700;
        color: #1A0A00;
        letter-spacing: 0.01em;
      }
      .il-brand span {
        color: #FF5722;
      }
      .il-sub {
        font-family: -apple-system, sans-serif;
        font-size: 12px;
        color: #8D6E63;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-top: -14px;
      }
      /* Spinner ring */
      .il-ring {
        width: 40px;
        height: 40px;
        border: 3px solid #FDEBD0;
        border-top-color: #FF5722;
        border-radius: 50%;
        animation: il-spin 0.8s linear infinite;
      }
      /* Dots loader */
      .il-dots {
        display: flex;
        gap: 8px;
      }
      .il-dots span {
        width: 8px;
        height: 8px;
        background: #FF5722;
        border-radius: 50%;
        animation: il-bounce 1.2s ease-in-out infinite;
      }
      .il-dots span:nth-child(2) { animation-delay: 0.2s; }
      .il-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes il-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes il-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50%       { transform: scale(1.06); opacity: 0.85; }
      }
      @keyframes il-bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40%            { transform: translateY(-10px); opacity: 1; }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#FFF9F5">

    <!-- Instant loader — visible before React boots -->
    <div id="initial-loader">
      <img src="/logo.jpeg" alt="Asquare & Co." class="il-logo" />
      <div class="il-brand">Asquare <span>&amp; Co.</span></div>
      <div class="il-sub">Tours &amp; Travels · Goa Specialists</div>
      <div class="il-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Hide the initial loader once React has mounted
      window.__hideInitialLoader = function() {
        var el = document.getElementById('initial-loader');
        if (el) {
          el.classList.add('hidden');
          setTimeout(function() { el.remove(); }, 450);
        }
      };
      // Fallback: auto-hide after 5 seconds if React never calls it
      setTimeout(function() {
        window.__hideInitialLoader && window.__hideInitialLoader();
      }, 5000);
    </script>
  </body>
</html>
